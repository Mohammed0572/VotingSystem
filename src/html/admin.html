<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GovTech Voting - Admin Dashboard</title>
  
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Inter Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Inter', sans-serif; }
    
    /* Negative z-index decorative background */
    .bg-pattern {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: -10;
      background-color: #F8FAFC;
      background-image: radial-gradient(#E2E8F0 1px, transparent 1px);
      background-size: 24px 24px;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col antialiased">
  
  <div class="bg-pattern"></div>
  
  <!-- Fixed Header with explicit z-index (z-50) -->
  <header class="fixed top-0 w-full bg-white border-b border-slate-200 z-50 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <div class="flex items-center gap-2 text-blue-700">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
        <span class="font-bold text-lg tracking-tight">Admin Dashboard</span>
      </div>
      <div class="flex items-center gap-4">
        <span class="hidden sm:inline-flex text-xs font-semibold uppercase tracking-wider text-green-700 bg-green-50 px-2 py-1 rounded border border-green-200">
          <svg class="w-3 h-3 mr-1 inline-block" fill="currentColor" viewBox="0 0 8 8"><circle cx="4" cy="4" r="3"></circle></svg>
          Chain Sync
        </span>
        <button onclick="logout()" class="text-sm font-medium text-slate-500 hover:text-slate-900 transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 rounded px-2 py-1">Logout</button>
      </div>
    </div>
  </header>

  <!-- Responsive Layout Padding -->
  <main class="flex-grow pt-24 pb-12 px-4 sm:px-6 lg:px-8 max-w-5xl mx-auto w-full relative z-0">
    <div class="mb-8">
      <h1 class="text-2xl font-bold text-slate-900">Election Management</h1>
      <p class="text-sm text-slate-600 mt-1">Configure candidates and voting periods. All actions are securely recorded on-chain.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      
      <!-- Card: Add Candidate -->
      <section class="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
        <div class="px-6 py-5 border-b border-slate-100 bg-slate-50">
          <h2 class="text-base font-semibold text-slate-900 flex items-center gap-2">
            <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>
            Register Candidate
          </h2>
        </div>
        <div class="p-6 space-y-5">
          <div>
            <label for="name" class="block text-sm font-medium text-slate-700 mb-1">Candidate Name</label>
            <input id="name" type="text" name="name" placeholder="e.g. Jane Doe" autocomplete="off" class="w-full px-4 py-2 bg-white border border-slate-300 rounded-md text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-blue-600 transition-colors duration-200">
          </div>
          <div>
            <label for="party" class="block text-sm font-medium text-slate-700 mb-1">Political Party</label>
            <input id="party" type="text" name="party" placeholder="e.g. Independent" autocomplete="off" class="w-full px-4 py-2 bg-white border border-slate-300 rounded-md text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-blue-600 transition-colors duration-200">
          </div>
          <button id="addCandidate" type="button" class="mt-2 w-full inline-flex items-center justify-center gap-2 px-4 py-2.5 bg-blue-600 border border-transparent text-white text-sm font-medium rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:ring-offset-1 transition-colors duration-200 cursor-pointer shadow-sm">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            Commit to Chain
          </button>
        </div>
      </section>

      <!-- Card: Define Dates -->
      <section class="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
        <div class="px-6 py-5 border-b border-slate-100 bg-slate-50">
          <h2 class="text-base font-semibold text-slate-900 flex items-center gap-2">
            <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            Define Voting Period
          </h2>
        </div>
        <div class="p-6 space-y-5">
          <div>
            <label for="startDate" class="block text-sm font-medium text-slate-700 mb-1">Start Date</label>
            <input id="startDate" type="date" class="w-full px-4 py-2 bg-white border border-slate-300 rounded-md text-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-blue-600 transition-colors duration-200 cursor-pointer">
          </div>
          <div>
            <label for="endDate" class="block text-sm font-medium text-slate-700 mb-1">End Date</label>
            <input id="endDate" type="date" class="w-full px-4 py-2 bg-white border border-slate-300 rounded-md text-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-blue-600 transition-colors duration-200 cursor-pointer">
          </div>
          <button id="addDate" type="button" class="mt-2 w-full inline-flex items-center justify-center gap-2 px-4 py-2.5 bg-blue-600 border border-transparent text-white text-sm font-medium rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:ring-offset-1 transition-colors duration-200 cursor-pointer shadow-sm">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            Set Election Dates
          </button>
        </div>
      </section>

    </div>
  </main>

  <!-- jQuery (required by app.bundle.js) & Blockchain Logic -->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
  <script src="../dist/app.bundle.js" type="module"></script>
  
  <script>
    // Minimal logout handler
    function logout() {
      localStorage.removeItem('jwtTokenAdmin');
      window.location.replace('/');
    }
  </script>
</body>
</html>
