<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Decentralized Voting System - Login</title>
  
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Inter Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Inter', sans-serif; }
    
    /* Z-Index Rule: Negative z-index for backgrounds */
    .bg-pattern {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: -10;
      background-color: #F8FAFC; /* Tailwind slate-50 equivalent */
      background-image: radial-gradient(#E2E8F0 1px, transparent 1px);
      background-size: 24px 24px;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col antialiased">
  
  <!-- Decorative Background -->
  <div class="bg-pattern"></div>
  
  <!-- Z-Index Rule: Fixed navigation needs explicit z-index (z-50) -->
  <header class="fixed top-0 w-full bg-white border-b border-slate-200 z-50 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <div class="flex items-center gap-2 text-blue-700">
        <!-- SVG Icon (Heroicon) instead of Emoji, consistent w-6 h-6 -->
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
        <span class="font-bold text-lg tracking-tight">GovTech Voting System</span>
      </div>
      <span class="text-xs font-semibold uppercase tracking-wider text-blue-600 bg-blue-50 px-2 py-1 rounded border border-blue-100">Secured Node</span>
    </div>
  </header>

  <!-- Layout Rule: Responsive padding (px-4 sm:px-6 lg:px-8) -->
  <main class="flex-grow flex items-center justify-center pt-24 pb-12 px-4 sm:px-6 lg:px-8 relative z-0">
    <div class="w-full max-w-md bg-white border border-slate-200 shadow-md rounded-xl overflow-hidden">
      
      <!-- Tab Toggle -->
      <div class="flex border-b border-slate-200 bg-slate-50" role="tablist">
        <!-- Interaction Rule: cursor-pointer, focus rings, transition-colors -->
        <button id="tabVoter" onclick="switchTab('voter')" role="tab" aria-selected="true" class="flex-1 py-4 text-sm font-semibold text-blue-600 border-b-2 border-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-inset transition-colors duration-200 cursor-pointer flex items-center justify-center gap-2">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
          Voter Login
        </button>
        <button id="tabAdmin" onclick="switchTab('admin')" role="tab" aria-selected="false" class="flex-1 py-4 text-sm font-semibold text-slate-500 border-b-2 border-transparent hover:text-slate-700 hover:bg-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-inset transition-colors duration-200 cursor-pointer flex items-center justify-center gap-2">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
          Admin Login
        </button>
      </div>

      <!-- Voter Panel -->
      <div id="panelVoter" class="p-6 sm:p-8" role="tabpanel">
        <div class="mb-6">
          <h1 class="text-xl font-bold text-slate-900 mb-1">Voter Authentication</h1>
          <!-- Accessibility Rule: 4.5:1 text contrast minimum (slate-600 on white passes WCAG AA) -->
          <p class="text-sm text-slate-600">Enter your credentials and complete facial verification.</p>
        </div>

        <div class="space-y-5">
          <div>
            <!-- Accessibility Rule: <label> tags for all form inputs -->
            <label for="voter-id" class="block text-sm font-medium text-slate-700 mb-1">Voter ID Number</label>
            <input type="text" id="voter-id" name="voter-id" placeholder="e.g. VTR-84291" autocomplete="off" class="w-full px-4 py-2 bg-white border border-slate-300 rounded-md text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-blue-600 transition-colors duration-200">
          </div>

          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Biometric Capture</label>
            <div id="webcamContainer" class="relative w-full aspect-video bg-slate-900 rounded-md overflow-hidden border border-slate-300">
              <video id="webcam-feed" class="w-full h-full object-cover scale-x-[-1]" autoplay playsinline muted></video>
              <canvas id="hidden-canvas" class="hidden"></canvas>
              
              <div id="webcamOverlay" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-900/85 text-slate-300 z-10">
                <svg class="w-6 h-6 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                <span class="text-sm font-medium">Camera Inactive</span>
              </div>
              <div id="faceGuide" class="hidden absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[45%] h-[65%] border-2 border-dashed border-blue-500/60 rounded-full z-20 pointer-events-none"></div>
            </div>
            <div id="status-message" class="mt-2 text-sm text-center text-slate-600 min-h-[1.25rem]"></div>
          </div>

          <div class="flex flex-col sm:flex-row gap-3 pt-2">
            <button type="button" id="btn-start-webcam" class="flex-1 inline-flex items-center justify-center gap-2 px-4 py-2.5 bg-white border border-slate-300 text-slate-700 text-sm font-medium rounded-md hover:bg-slate-50 hover:text-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:ring-offset-1 transition-colors duration-200 cursor-pointer">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
              Open Webcam
            </button>
            <button type="button" id="btn-capture-verify" class="hidden flex-1 inline-flex items-center justify-center gap-2 px-4 py-2.5 bg-blue-600 border border-transparent text-white text-sm font-medium rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:ring-offset-1 disabled:opacity-50 disabled:cursor-not-allowed transition-colors duration-200 cursor-pointer shadow-sm">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
              Capture &amp; Verify
            </button>
          </div>
          <div id="errorMsg" class="hidden mt-2 p-3 bg-red-50 border border-red-200 text-red-700 text-sm rounded-md text-center"></div>
        </div>
      </div>

      <!-- Admin Panel -->
      <div id="panelAdmin" class="hidden p-6 sm:p-8" role="tabpanel">
        <div class="mb-6">
          <h1 class="text-xl font-bold text-slate-900 mb-1">Election Administration</h1>
          <p class="text-sm text-slate-600">Authorized personnel only. Please enter your credentials.</p>
        </div>

        <div class="space-y-5">
          <div>
            <label for="admin-id" class="block text-sm font-medium text-slate-700 mb-1">Admin ID</label>
            <input type="text" id="admin-id" name="admin-id" placeholder="Enter admin ID" autocomplete="off" class="w-full px-4 py-2 bg-white border border-slate-300 rounded-md text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-blue-600 transition-colors duration-200">
          </div>
          
          <div>
            <label for="admin-password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
            <input type="password" id="admin-password" name="admin-password" placeholder="Enter password" class="w-full px-4 py-2 bg-white border border-slate-300 rounded-md text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-blue-600 transition-colors duration-200">
          </div>

          <div id="adminStatusMsg" class="text-sm text-center text-slate-600 min-h-[1.25rem]"></div>

          <div class="pt-2">
            <button type="button" id="btnAdminLogin" onclick="adminLogin()" class="w-full inline-flex items-center justify-center gap-2 px-4 py-2.5 bg-blue-600 border border-transparent text-white text-sm font-medium rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:ring-offset-1 transition-colors duration-200 cursor-pointer shadow-sm">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path></svg>
              Access Dashboard
            </button>
          </div>
          <div id="adminErrorMsg" class="hidden mt-2 p-3 bg-red-50 border border-red-200 text-red-700 text-sm rounded-md text-center"></div>
        </div>
      </div>
      
      <!-- Footer -->
      <div class="bg-slate-50 border-t border-slate-200 px-6 py-4">
        <p class="text-xs text-center text-slate-500 flex items-center justify-center gap-1.5">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
          256-bit encrypted data transmission
        </p>
      </div>

    </div>
  </main>

  <script>
    function switchTab(tab) {
      const panelVoter = document.getElementById('panelVoter');
      const panelAdmin = document.getElementById('panelAdmin');
      const tabVoter = document.getElementById('tabVoter');
      const tabAdmin = document.getElementById('tabAdmin');

      const activeTabClasses = ['text-blue-600', 'border-blue-600'];
      const inactiveTabClasses = ['text-slate-500', 'border-transparent', 'hover:text-slate-700', 'hover:bg-slate-100'];

      if (tab === 'voter') {
        panelVoter.classList.remove('hidden');
        panelAdmin.classList.add('hidden');
        
        tabVoter.classList.add(...activeTabClasses);
        tabVoter.classList.remove(...inactiveTabClasses);
        tabVoter.setAttribute('aria-selected', 'true');
        
        tabAdmin.classList.add(...inactiveTabClasses);
        tabAdmin.classList.remove(...activeTabClasses);
        tabAdmin.setAttribute('aria-selected', 'false');
      } else {
        panelAdmin.classList.remove('hidden');
        panelVoter.classList.add('hidden');
        
        tabAdmin.classList.add(...activeTabClasses);
        tabAdmin.classList.remove(...inactiveTabClasses);
        tabAdmin.setAttribute('aria-selected', 'true');
        
        tabVoter.classList.add(...inactiveTabClasses);
        tabVoter.classList.remove(...activeTabClasses);
        tabVoter.setAttribute('aria-selected', 'false');
      }
    }

    async function adminLogin() {
      const btn = document.getElementById('btnAdminLogin');
      const status = document.getElementById('adminStatusMsg');
      const errorMsg = document.getElementById('adminErrorMsg');
      const adminId = document.getElementById('admin-id').value.trim();
      const adminPassword = document.getElementById('admin-password').value.trim();

      // Validate inputs
      if (!adminId || !adminPassword) {
        errorMsg.textContent = 'Please enter both Admin ID and Password.';
        errorMsg.classList.remove('hidden');
        return;
      }

      errorMsg.classList.add('hidden');
      status.textContent = 'Authenticating...';
      status.className = 'mt-2 text-sm text-center text-blue-600 min-h-[1.25rem]';
      btn.disabled = true;
      btn.classList.add('opacity-50', 'cursor-not-allowed');

      try {
        const response = await fetch('http://127.0.0.1:8000/verify-face', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            voter_id: adminId,
            image_base64: adminPassword
          })
        });

        if (response.ok) {
          const data = await response.json();
          if (data.role === 'admin') {
            status.textContent = 'Authentication successful. Redirecting...';
            status.className = 'mt-2 text-sm text-center text-green-600 min-h-[1.25rem]';
            localStorage.setItem('adminToken', data.token);
            setTimeout(() => {
              window.location.replace('/admin.html');
            }, 500);
          } else {
            status.textContent = '';
            errorMsg.textContent = 'Access denied. Admin privileges required.';
            errorMsg.classList.remove('hidden');
            btn.disabled = false;
            btn.classList.remove('opacity-50', 'cursor-not-allowed');
          }
        } else {
          const errData = await response.json().catch(() => ({}));
          status.textContent = '';
          errorMsg.textContent = errData.detail || 'Authentication failed. Please check your credentials.';
          errorMsg.classList.remove('hidden');
          btn.disabled = false;
          btn.classList.remove('opacity-50', 'cursor-not-allowed');
        }
      } catch (error) {
        status.textContent = '';
        errorMsg.textContent = 'Network error. Please ensure the authentication server is running.';
        errorMsg.classList.remove('hidden');
        btn.disabled = false;
        btn.classList.remove('opacity-50', 'cursor-not-allowed');
      }
    }
  </script>
  
  <!-- Face verification logic (voter login) -->
  <script src="../js/login.js"></script>
</body>
</html>
